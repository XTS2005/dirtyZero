name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone PartyUI
        run: |
          git clone --branch 0.5.5 --depth 1 https://github.com/XTS2005/PartyUI.git ../PartyUI
      
      - name: Setup latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Make script executable
        run: chmod +x ipabuild.sh
      
      - name: Build IPA
        run: ./ipabuild.sh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirtyZero
          path: dirtyZero.ipa