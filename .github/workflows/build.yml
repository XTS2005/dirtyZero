name: build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: install ldid
        run: brew install ldid

      - name: build
        run: |
          chmod +x ipabuild.sh
          ./ipabuild.sh

      - name: upload artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dirtyZero-ipa
          path: |
            dirtyZero.ipa

      - name: upload release ipa
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: dirtyZero.ipa

  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download ipa
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: build/

      - name: get last 12h commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          if [ -z "$COMMITS" ]; then
            COMMITS="no commits in the last 12 hours"
          fi

          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: write release notes
        run: |
          cat <<EOF > release_notes.txt
          dirtyZero nightly build
          
          Last 12 hours commits:
          
          ${COMMITS}
          EOF

      - name: update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly >/dev/null 2>&1 || \
          gh release create nightly \
            --title "Nightly" \
            --notes "initial nightly" \
            --prerelease
      
          gh release edit nightly \
            --title "Nightly" \
            --notes-file release_notes.txt \
            --prerelease
      
          gh release upload nightly build/dirtyZero.ipa --clobber